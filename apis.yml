aid: bluecart
name: BlueCart
description: >-
  BlueCart is an end-to-end eCommerce and procurement platform for the
  hospitality and food and beverage industries, connecting restaurants and
  buyers with wholesale distributors and suppliers. It streamlines wholesale
  ordering, order management, inventory, and payments for both sides of the
  supply chain. BlueCart exposes a public REST API that lets distributors and
  partners programmatically manage products, orders, customers, and related
  resources, returning JSON responses and integrating BlueCart data with
  external accounting, eCommerce, and logistics systems used across foodservice
  operations.
type: Index
