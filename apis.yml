apis:
  - aid: bluecart:rest-api
    name: BlueCart API
    description: >-
      The BlueCart API is defined using REST with predictable, resource-oriented
      URLs and returns JSON-encoded responses with standard HTTP status codes.
      It is authenticated using AWS Signature Version 4, requiring an Access Key
      ID, Secret Access Key, and API Key generated from the BlueCart app under
      Settings, API Access Credentials. The API operates on one object per
      request and does not support bulk updates, and a Postman collection is
      provided to help developers make their first request.
    humanURL: https://docs.bluecart.com/
