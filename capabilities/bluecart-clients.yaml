naftiko: 1.0.0-alpha2
info:
  label: BlueCart API — Clients
  description: 'Clients surface of the BlueCart API. 3 operations. Lead operation: Create A Client Association. Self-contained Naftiko capability covering one BlueCart business surface.'
  tags:
  - BlueCart
  - Procurement
  - Clients
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    BLUECART_API_KEY: BLUECART_API_KEY
capability:
  consumes:
  - type: http
    namespace: bluecart-clients
    baseUri: https://api.bluecart.com
    description: BlueCart API — Clients business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.BLUECART_API_KEY}}'
      placement: header
    resources:
    - name: api-clients
      path: /api/clients/
      operations:
      - name: createClient
        method: POST
        description: Create A Client Association
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-clients-id
      path: /api/clients/{id}
      operations:
      - name: retrieveClient
        method: GET
        description: Retrieve A Client
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Client identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-clients-id
      path: /api/clients/{id}
      operations:
      - name: updateClient
        method: PUT
        description: Update A Client
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Client identifier.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bluecart-clients-rest
    port: 8080
    description: REST adapter for BlueCart API — Clients. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/clients
      name: api-clients
      description: REST surface for Create A Client Association.
      operations:
      - method: POST
        name: createClient
        description: Create A Client Association
        call: bluecart-clients.createClient
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/clients-id
      name: api-clients-id
      description: REST surface for Retrieve A Client.
      operations:
      - method: GET
        name: retrieveClient
        description: Retrieve A Client
        call: bluecart-clients.retrieveClient
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/clients-id
      name: api-clients-id
      description: REST surface for Update A Client.
      operations:
      - method: PUT
        name: updateClient
        description: Update A Client
        call: bluecart-clients.updateClient
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bluecart-clients-mcp
    port: 9090
    transport: http
    description: MCP adapter for BlueCart API — Clients. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-client-association
      description: Create A Client Association
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bluecart-clients.createClient
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-client
      description: Retrieve A Client
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluecart-clients.retrieveClient
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-client
      description: Update A Client
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bluecart-clients.updateClient
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
