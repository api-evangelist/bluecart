naftiko: 1.0.0-alpha2
info:
  label: BlueCart API — Products
  description: 'Products surface of the BlueCart API. 5 operations. Lead operation: Retrieve All Products. Self-contained Naftiko capability covering one BlueCart business surface.'
  tags:
  - BlueCart
  - Procurement
  - Products
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    BLUECART_API_KEY: BLUECART_API_KEY
capability:
  consumes:
  - type: http
    namespace: bluecart-products
    baseUri: https://api.bluecart.com
    description: BlueCart API — Products business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.BLUECART_API_KEY}}'
      placement: header
    resources:
    - name: products
      path: /products/
      operations:
      - name: retrieveAllProducts
        method: GET
        description: Retrieve All Products
        inputParameters:
        - name: sku
          in: query
          type: string
          required: false
          description: Filter products by SKU.
        - name: name
          in: query
          type: string
          required: false
          description: Filter products by name.
        - name: description
          in: query
          type: string
          required: false
          description: Filter products by description.
        - name: nextToken
          in: query
          type: string
          required: false
          description: Pagination token returned by a previous page; omit for the first page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-products
      path: /api/products/
      operations:
      - name: createProduct
        method: POST
        description: Create A Product
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-products-id
      path: /api/products/{id}
      operations:
      - name: retrieveProduct
        method: GET
        description: Retrieve A Product
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Product identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-products-id
      path: /api/products/{id}
      operations:
      - name: updateProduct
        method: PUT
        description: Update A Product
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Product identifier.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-products-id
      path: /api/products/{id}
      operations:
      - name: deleteProduct
        method: DELETE
        description: Delete A Product
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Product identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bluecart-products-rest
    port: 8080
    description: REST adapter for BlueCart API — Products. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/products
      name: products
      description: REST surface for Retrieve All Products.
      operations:
      - method: GET
        name: retrieveAllProducts
        description: Retrieve All Products
        call: bluecart-products.retrieveAllProducts
        with:
          sku: rest.sku
          name: rest.name
          description: rest.description
          nextToken: rest.nextToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products
      name: api-products
      description: REST surface for Create A Product.
      operations:
      - method: POST
        name: createProduct
        description: Create A Product
        call: bluecart-products.createProduct
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products-id
      name: api-products-id
      description: REST surface for Retrieve A Product.
      operations:
      - method: GET
        name: retrieveProduct
        description: Retrieve A Product
        call: bluecart-products.retrieveProduct
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products-id
      name: api-products-id
      description: REST surface for Update A Product.
      operations:
      - method: PUT
        name: updateProduct
        description: Update A Product
        call: bluecart-products.updateProduct
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products-id
      name: api-products-id
      description: REST surface for Delete A Product.
      operations:
      - method: DELETE
        name: deleteProduct
        description: Delete A Product
        call: bluecart-products.deleteProduct
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bluecart-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for BlueCart API — Products. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-all-products
      description: Retrieve All Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluecart-products.retrieveAllProducts
      with:
        sku: tools.sku
        name: tools.name
        description: tools.description
        nextToken: tools.nextToken
      outputParameters:
      - type: object
        mapping: $.
    - name: create-product
      description: Create A Product
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bluecart-products.createProduct
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-product
      description: Retrieve A Product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluecart-products.retrieveProduct
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-product
      description: Update A Product
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bluecart-products.updateProduct
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-product
      description: Delete A Product
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bluecart-products.deleteProduct
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
