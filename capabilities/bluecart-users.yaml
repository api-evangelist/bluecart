naftiko: 1.0.0-alpha2
info:
  label: BlueCart API — Users
  description: 'Users surface of the BlueCart API. 5 operations. Lead operation: List Users. Self-contained Naftiko capability covering one BlueCart business surface.'
  tags:
  - BlueCart
  - Procurement
  - Users
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    BLUECART_API_KEY: BLUECART_API_KEY
capability:
  consumes:
  - type: http
    namespace: bluecart-users
    baseUri: https://api.bluecart.com
    description: BlueCart API — Users business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.BLUECART_API_KEY}}'
      placement: header
    resources:
    - name: users
      path: /users/
      operations:
      - name: listUsers
        method: GET
        description: List Users
        inputParameters:
        - name: nextToken
          in: query
          type: string
          required: false
          description: Pagination token returned by a previous page; omit for the first page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /users/
      operations:
      - name: createUser
        method: POST
        description: Create A User
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-id
      path: /users/{id}
      operations:
      - name: retrieveUser
        method: GET
        description: Retrieve A User
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: User identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-id
      path: /users/{id}
      operations:
      - name: updateUser
        method: PUT
        description: Update A User
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: User identifier.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-id
      path: /users/{id}
      operations:
      - name: disableUser
        method: DELETE
        description: Disable A User
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: User identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bluecart-users-rest
    port: 8080
    description: REST adapter for BlueCart API — Users. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for List Users.
      operations:
      - method: GET
        name: listUsers
        description: List Users
        call: bluecart-users.listUsers
        with:
          nextToken: rest.nextToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users
      name: users
      description: REST surface for Create A User.
      operations:
      - method: POST
        name: createUser
        description: Create A User
        call: bluecart-users.createUser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users-id
      name: users-id
      description: REST surface for Retrieve A User.
      operations:
      - method: GET
        name: retrieveUser
        description: Retrieve A User
        call: bluecart-users.retrieveUser
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users-id
      name: users-id
      description: REST surface for Update A User.
      operations:
      - method: PUT
        name: updateUser
        description: Update A User
        call: bluecart-users.updateUser
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users-id
      name: users-id
      description: REST surface for Disable A User.
      operations:
      - method: DELETE
        name: disableUser
        description: Disable A User
        call: bluecart-users.disableUser
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bluecart-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for BlueCart API — Users. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-users
      description: List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluecart-users.listUsers
      with:
        nextToken: tools.nextToken
      outputParameters:
      - type: object
        mapping: $.
    - name: create-user
      description: Create A User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bluecart-users.createUser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-user
      description: Retrieve A User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluecart-users.retrieveUser
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user
      description: Update A User
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bluecart-users.updateUser
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: disable-user
      description: Disable A User
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bluecart-users.disableUser
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
