components:
  securitySchemes:
    awsSigV4:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        AWS Signature Version 4 authorization against the AWS execute-api
        service in us-east-1. Requires an Access Key ID, Secret Access Key, and
        API Key generated in the BlueCart app under Settings, API Access
        Credentials. The API Key is supplied via the x-api-key header.
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: BlueCart API Key generated under Settings, API Access Credentials.
  parameters:
    NextToken:
      name: nextToken
      in: query
      description: Pagination token returned by a previous page; omit for the first page.
      required: false
      schema:
        type: string
    OrderId:
      name: id
      in: path
      description: Order identifier.
      required: true
      schema:
        type: integer
        format: int64
    ProductId:
      name: id
      in: path
      description: Product identifier.
      required: true
      schema:
        type: integer
        format: int64
    CatalogId:
      name: id
      in: path
      description: Catalog identifier.
      required: true
      schema:
        type: integer
        format: int64
    ClientId:
      name: id
      in: path
      description: Client identifier.
      required: true
      schema:
        type: integer
        format: int64
    UserId:
      name: id
      in: path
      description: User identifier.
      required: true
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: The request was malformed or failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication failed or credentials were missing.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      title: Error
      type: object
      description: Standard error response.
      properties:
        message:
          type: string
          description: Human-readable error message.
          example: Order not found.
    OrderProduct:
      title: OrderProduct
      type: object
      description: A line item within an order.
      x-schema-source: documentation
      x-source-url: https://docs.bluecart.com/endpoints
      properties:
        productId:
          type: integer
          format: int64
          description: Identifier of the product.
          example: 90210
        sku:
          type: string
          description: Stock keeping unit of the product.
          example: WINE-CAB-750
        name:
          type: string
          description: Product name.
          example: Cabernet Sauvignon 750ml
        quantity:
          type: number
          description: Quantity ordered.
          example: 12
        price:
          type: number
          format: float
          description: Unit price for this line item.
          example: 18.5
    Order:
      title: Order
      type: object
      description: A wholesale order between a client and a vendor.
      x-schema-source: documentation
      x-source-url: https://docs.bluecart.com/endpoints
      properties:
        orderId:
          type: integer
          format: int64
          description: Unique order identifier.
          example: 100245
        clientId:
          type: integer
          format: int64
          description: Identifier of the client placing the order.
          example: 5012
        vendorId:
          type: integer
          format: int64
          description: Identifier of the vendor fulfilling the order.
          example: 880
        status:
          type: string
          description: Current order status.
          enum:
          - New
          - Processing
          - In-Transit/Shipped
          - Fulfilled
          - Cancelled
          example: New
        deliveryType:
          type: string
          description: Delivery method for the order.
          example: Delivery
        currency:
          type: string
          description: ISO currency code for monetary amounts.
          example: USD
        deliveryCharge:
          type: number
          format: float
          description: Delivery charge applied to the order.
          example: 25
        requestedDeliveryDate:
          type: string
          format: date
          description: Date delivery was requested for.
          example: '2026-06-10'
        deliveryDate:
          type: string
          format: date
          description: Actual delivery date.
          example: '2026-06-10'
        shippingDate:
          type: string
          format: date
          description: Date the order shipped.
          example: '2026-06-09'
        creationDate:
          type: string
          format: date-time
          description: Timestamp the order was created.
          example: '2026-06-02T14:30:00Z'
        lastUpdateDate:
          type: string
          format: date-time
          description: Timestamp the order was last updated.
          example: '2026-06-02T15:00:00Z'
        products:
          type: array
          description: Line items in the order.
          items:
            $ref: '#/components/schemas/OrderProduct'
        addresses:
          type: object
          description: Billing and shipping addresses for the order.
          additionalProperties: true
        totals:
          type: object
          description: Computed monetary totals for the order.
          additionalProperties: true
    OrderCreate:
      title: OrderCreate
      type: object
      description: Payload for placing a new order.
      required:
      - clientId
      - products
      properties:
        clientId:
          type: integer
          format: int64
          description: Identifier of the client placing the order.
          example: 5012
        user:
          type: object
          description: The user placing the order.
          properties:
            id:
              type: integer
              format: int64
              example: 3001
            type:
              type: string
              example: STAFF
        deliveryCharge:
          type: number
          format: float
          description: Delivery charge to apply.
          example: 25
        deliveryType:
          type: string
          description: Delivery method.
          example: Delivery
        requestedDeliveryDate:
          type: string
          format: date
          description: Requested delivery date.
          example: '2026-06-10'
        currency:
          type: string
          description: ISO currency code.
          example: USD
        addresses:
          type: object
          description: Billing and shipping addresses.
          additionalProperties: true
        products:
          type: array
          description: Line items to include in the order.
          items:
            $ref: '#/components/schemas/OrderProduct'
        presetCreationDate:
          type: string
          format: date-time
          description: Optional preset creation timestamp for the order.
          example: '2026-06-02T14:30:00Z'
    OrderUpdate:
      title: OrderUpdate
      type: object
      description: Payload for modifying an existing order.
      properties:
        userId:
          type: integer
          format: int64
          description: Identifier of the user making the change.
          example: 3001
        status:
          type: string
          description: New order status.
          enum:
          - New
          - Processing
          - In-Transit/Shipped
          - Fulfilled
          - Cancelled
          example: Processing
        deliveryCharge:
          type: number
          format: float
          description: Updated delivery charge.
          example: 25
        requestedDeliveryDate:
          type: string
          format: date
          example: '2026-06-10'
        deliveryDate:
          type: string
          format: date
          example: '2026-06-10'
        shippingDate:
          type: string
          format: date
          example: '2026-06-09'
        paymentStatus:
          type: string
          description: Payment status for the order.
          example: Paid
        trackingInfo:
          type: string
          description: Shipment tracking information.
          example: 1Z999AA10123456784
        addresses:
          type: object
          additionalProperties: true
        products:
          type: array
          items:
            $ref: '#/components/schemas/OrderProduct'
    OrderCreateResult:
      title: OrderCreateResult
      type: object
      description: Result of placing an order, including any warnings.
      properties:
