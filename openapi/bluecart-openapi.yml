                    status: New
                    deliveryType: Delivery
                    currency: USD
                    deliveryCharge: 25
                    requestedDeliveryDate: '2026-06-10'
                    deliveryDate: '2026-06-10'
                    shippingDate: '2026-06-09'
                    creationDate: '2026-06-02T14:30:00Z'
